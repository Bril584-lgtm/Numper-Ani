<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numper Ani</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161e;
      --border: #2a2a3a;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #e2e2e8;
      --muted: #888899;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ─── Layout ─── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    header { display: flex; align-items: center; gap: 14px; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    #logo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .brand { font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .brand span { color: var(--text); }

    /* ─── Search ─── */
    #search-bar { display: flex; gap: 10px; padding: 18px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    #search-input { flex: 1; padding: 10px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; outline: none; transition: border-color .2s; }
    #search-input:focus { border-color: var(--accent); }
    #dub-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .875rem; transition: border-color .2s; white-space: nowrap; }
    #dub-toggle.active { border-color: var(--accent); color: var(--accent); }
    #search-btn { padding: 10px 20px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    #search-btn:hover { background: var(--accent2); }

    /* ─── Main content ─── */
    main { flex: 1; padding: 24px; overflow-y: auto; }

    /* ─── Tabs ─── */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .9rem; transition: all .2s; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── Results grid ─── */
    #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
    .anime-card { border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s; }
    .anime-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--border); display: block; }
    .anime-card .card-thumb-placeholder { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3a 100%); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

    .anime-card .card-info { padding: 10px; }
    .anime-card .card-title { font-size: .85rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .anime-card .card-meta { font-size: .75rem; color: var(--muted); }
    .anime-card .source-badge { display: inline-block; font-size: .65rem; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); margin-top: 4px; }

    /* ─── Episode panel ─── */
    #ep-panel { display: none; }
    #ep-panel.open { display: block; }
    #ep-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
    #ep-thumb { width: 80px; height: 112px; border-radius: 8px; object-fit: cover; background: var(--border); }
    #ep-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    #ep-meta { color: var(--muted); font-size: .875rem; }
    #back-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: .875rem; margin-bottom: 16px; }
    #ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 10px; }
    .ep-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; text-align: center; font-size: .9rem; font-weight: 600; transition: all .2s; }
    .ep-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ep-btn.watched { background: #1a2a1a; border-color: #2a4a2a; color: #4caf50; }
    .ep-btn.current { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── Player ─── */
    #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
    #player-view.open { display: flex; }
    #player-topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: rgba(0,0,0,0.9); flex-shrink: 0; }
    #player-back { border: none; background: none; color: #fff; font-size: 1.5rem; cursor: pointer; line-height: 1; }
    #player-title { color: #fff; font-size: 1rem; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #player-src { color: var(--muted); font-size: .75rem; white-space: nowrap; }
    #cc-btn { border: 1px solid #444; background: none; color: #ccc; padding: 3px 9px; border-radius: 5px; font-size: .75rem; cursor: pointer; transition: all .15s; }
    #cc-btn.on { border-color: var(--accent); color: var(--accent); }
    #sub-select { position: relative; }
    #sub-select-btn { border: 1px solid #444; background: none; color: #ccc; padding: 3px 9px; border-radius: 5px; font-size: .75rem; cursor: pointer; transition: all .15s; }
    #sub-select-btn.on { border-color: var(--accent); color: var(--accent); }
    #sub-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #1a1a2e; border: 1px solid #444; border-radius: 8px; overflow: hidden; z-index: 20; min-width: 140px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    #sub-select.open #sub-dropdown { display: block; }
    .sub-opt { display: block; width: 100%; padding: 8px 14px; background: none; border: none; color: #ccc; font-size: .8rem; cursor: pointer; text-align: left; transition: background .15s; }
    .sub-opt:hover { background: rgba(255,255,255,0.08); }
    .sub-opt.active { color: var(--accent); }
    #source-switcher { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px 16px; background: rgba(0,0,0,0.75); flex-shrink: 0; min-height: 34px; align-items: center; }
    .src-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a2e; color: #ccc; font-size: .75rem; cursor: pointer; transition: all .15s; }
    .src-btn:hover { border-color: var(--accent); color: var(--accent); }
    .src-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .src-btn.loading { opacity: 0.5; cursor: wait; }
    #player-video-wrap { flex: 1; position: relative; overflow: hidden; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; }
    #loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 5; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 6; flex-direction: column; gap: 10px; color: #ff6b6b; text-align: center; padding: 24px; }

    /* ─── History ─── */
    #history-section { margin-bottom: 28px; }
    #history-section h2 { font-size: 1rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

    /* ─── Search loading overlay ─── */
    #search-loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14,14,18,0.92);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    #search-loading.show { display: flex; }

    /* Pixel art scene */
    #pixel-scene {
      position: relative;
      width: 320px;
      height: 80px;
      image-rendering: pixelated;
    }
    /* Ground stripe */
    #pixel-scene::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: repeating-linear-gradient(90deg, #f97316 0 8px, #fb923c 8px 16px);
    }

    /* Running cat — CSS pixel art sprite */
    #run-cat {
      position: absolute;
      bottom: 6px;
      left: -48px;
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      animation: catRun 2.8s linear infinite;
    }
    @keyframes catRun {
      0%   { left: -48px; }
      100% { left: 340px; }
    }

    /* Library building at the right */
    #library-building {
      position: absolute;
      right: 0;
      bottom: 6px;
      width: 60px;
      height: 60px;
      image-rendering: pixelated;
    }

    /* Progress bar */
    #search-progress-wrap {
      width: 280px;
      height: 12px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    #search-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f97316, #fb923c);
      border-radius: 6px;
      transition: width 0.3s ease;
      animation: progressPulse 1.4s ease-in-out infinite alternate;
    }
    @keyframes progressPulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.3); }
    }
    #search-loading-label {
      color: var(--muted);
      font-size: 0.875rem;
      letter-spacing: 0.5px;
    }

    /* ─── Filters ─── */
    #filter-bar { display: none; padding: 10px 24px 12px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; align-items: center; }
    #filter-bar.show { display: flex; }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: .75rem; color: var(--muted); white-space: nowrap; }
    .filter-select { padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .8rem; cursor: pointer; outline: none; }
    .filter-select:focus { border-color: var(--accent); }
    #genre-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .genre-chip { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: .75rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .genre-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #filter-btn { padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: .875rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
    #filter-btn.active { border-color: var(--accent); color: var(--accent); }
    #clear-filters-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid #444; background: none; color: var(--muted); font-size: .75rem; cursor: pointer; display: none; }
    #clear-filters-btn.show { display: block; }

    /* ─── Empty ─── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; }

    /* ─── Status ─── */
    #status { text-align: center; padding: 16px; color: var(--muted); font-size: .875rem; display: none; }
    #status.show { display: block; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <!-- Numper mascot: orange cat with glasses holding a book -->
    <svg id="logo" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <circle cx="22" cy="22" r="22" fill="#f97316"/>
      <!-- Ears — drawn before head so head overlaps base -->
      <polygon points="9,19 14,3 21,15" fill="#f97316"/>
      <polygon points="35,19 30,3 23,15" fill="#f97316"/>
      <!-- Ear inner (pink) -->
      <polygon points="10.5,17.5 14,8 19,15" fill="#fb923c"/>
      <polygon points="33.5,17.5 30,8 25,15" fill="#fb923c"/>
      <!-- Round cat head -->
      <circle cx="22" cy="26" r="16" fill="#fdba74"/>
      <!-- Eyes white -->
      <circle cx="16" cy="23" r="3.5" fill="#fff"/>
      <circle cx="28" cy="23" r="3.5" fill="#fff"/>
      <!-- Pupils -->
      <circle cx="16.5" cy="23.2" r="2.1" fill="#1a1a2e"/>
      <circle cx="28.5" cy="23.2" r="2.1" fill="#1a1a2e"/>
      <!-- Eye shine -->
      <circle cx="17.3" cy="22.1" r="0.7" fill="#fff"/>
      <circle cx="29.3" cy="22.1" r="0.7" fill="#fff"/>
      <!-- Glasses frames -->
      <rect x="12" y="19.5" width="8.5" height="7" rx="2.5" fill="none" stroke="#333" stroke-width="1.2"/>
      <rect x="23.5" y="19.5" width="8.5" height="7" rx="2.5" fill="none" stroke="#333" stroke-width="1.2"/>
      <!-- Bridge + arms -->
      <line x1="20.5" y1="23" x2="23.5" y2="23" stroke="#333" stroke-width="1.2"/>
      <line x1="12" y1="22.5" x2="8.5" y2="21.5" stroke="#333" stroke-width="0.9"/>
      <line x1="32" y1="22.5" x2="35.5" y2="21.5" stroke="#333" stroke-width="0.9"/>
      <!-- Nose -->
      <ellipse cx="22" cy="28.5" rx="1.5" ry="1" fill="#e07b39"/>
      <!-- Mouth -->
      <path d="M19.5 30.5 Q22 32.5 24.5 30.5" stroke="#c2410c" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Whiskers left -->
      <line x1="4" y1="27.5" x2="13.5" y2="28.5" stroke="#92400e" stroke-width="0.7"/>
      <line x1="4" y1="30" x2="13.5" y2="30" stroke="#92400e" stroke-width="0.7"/>
      <!-- Whiskers right -->
      <line x1="40" y1="27.5" x2="30.5" y2="28.5" stroke="#92400e" stroke-width="0.7"/>
      <line x1="40" y1="30" x2="30.5" y2="30" stroke="#92400e" stroke-width="0.7"/>
    </svg>
    <div class="brand">Numper <span>Ani</span></div>
  </header>

  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search anime... (e.g. Chained Soldier, One Piece)" autocomplete="off"/>
    <button id="dub-toggle" title="Toggle dub/sub">🎙 DUB</button>
    <button id="filter-btn">⚙ Filter</button>
    <button id="search-btn">Search</button>
  </div>
  <div id="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <select id="filter-sort" class="filter-select">
        <option value="default">Default</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="score">Highest Rated</option>
        <option value="episodes">Most Episodes</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Type</span>
      <select id="filter-format" class="filter-select">
        <option value="">All</option>
        <option value="TV">TV</option>
        <option value="MOVIE">Movie</option>
        <option value="OVA">OVA</option>
        <option value="ONA">ONA</option>
        <option value="SPECIAL">Special</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <select id="filter-status" class="filter-select">
        <option value="">All</option>
        <option value="RELEASING">Ongoing</option>
        <option value="FINISHED">Completed</option>
      </select>
    </div>
    <div class="filter-group" id="genre-group" style="display:none">
      <span class="filter-label">Genre</span>
      <div id="genre-chips"></div>
    </div>
    <button id="clear-filters-btn">✕ Clear</button>
  </div>

  <main>
    <div id="home-view">
      <div id="history-section" style="display:none">
        <h2>Continue Watching</h2>
        <div id="history-grid" class="results-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;"></div>
      </div>
      <div class="empty-state" id="home-empty">
        <div class="icon">🐱</div>
        <p>Search for an anime above to get started!</p>
      </div>
    </div>

    <div id="results-view" style="display:none">
      <div class="tabs">
        <div class="tab active" data-tab="all">All Sources</div>
      </div>
      <div id="results-grid" class="results-grid"></div>
    </div>

    <div id="ep-panel">
      <button id="back-btn">← Back to results</button>
      <div id="ep-header">
        <img id="ep-thumb" src="" alt=""/>
        <div>
          <div id="ep-title"></div>
          <div id="ep-meta"></div>
        </div>
      </div>
      <div id="ep-grid"></div>
    </div>
  </main>

  <div id="status"></div>
</div>

<!-- Search loading overlay -->
<div id="search-loading">
  <div id="pixel-scene">
    <!-- Pixel cat running SVG -->
    <svg id="run-cat" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
      <!-- Body -->
      <rect x="8" y="14" width="16" height="10" fill="#f97316"/>
      <!-- Head -->
      <rect x="18" y="8" width="12" height="10" fill="#f97316"/>
      <!-- Ears -->
      <rect x="18" y="5" width="3" height="4" fill="#f97316"/>
      <rect x="26" y="5" width="3" height="4" fill="#f97316"/>
      <!-- Face -->
      <rect x="20" y="11" width="2" height="2" fill="#1a1a2e"/>
      <rect x="25" y="11" width="2" height="2" fill="#1a1a2e"/>
      <!-- Glasses -->
      <rect x="19" y="10" width="4" height="4" rx="1" fill="none" stroke="#333" stroke-width="1"/>
      <rect x="24" y="10" width="4" height="4" rx="1" fill="none" stroke="#333" stroke-width="1"/>
      <line x1="23" y1="12" x2="24" y2="12" stroke="#333" stroke-width="1"/>
      <!-- Nose -->
      <rect x="22" y="14" width="2" height="1" fill="#c2410c"/>
      <!-- Book carried in arms -->
      <rect x="4" y="15" width="6" height="8" fill="#1e3a8a"/>
      <rect x="4" y="15" width="1" height="8" fill="#1e40af"/>
      <rect x="5" y="15" width="5" height="8" fill="#3b82f6"/>
      <!-- Legs (animated) -->
      <rect class="leg-front" x="10" y="24" width="4" height="5" fill="#ea6f0a"/>
      <rect class="leg-back"  x="18" y="24" width="4" height="5" fill="#ea6f0a"/>
      <!-- Tail -->
      <rect x="6" y="12" width="3" height="3" fill="#f97316"/>
      <rect x="4" y="10" width="3" height="3" fill="#f97316"/>
    </svg>

    <!-- Library building pixel art -->
    <svg id="library-building" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Building -->
      <rect x="4" y="20" width="52" height="40" fill="#1e293b"/>
      <!-- Roof -->
      <polygon points="0,22 30,4 60,22" fill="#0f172a"/>
      <!-- Door -->
      <rect x="22" y="40" width="16" height="20" fill="#312e81"/>
      <!-- Windows -->
      <rect x="8" y="28" width="10" height="8" fill="#fbbf24"/>
      <rect x="42" y="28" width="10" height="8" fill="#fbbf24"/>
      <!-- Sign -->
      <rect x="14" y="24" width="32" height="6" fill="#f97316"/>
      <rect x="16" y="25" width="4" height="4" fill="#fff"/>
      <rect x="22" y="25" width="4" height="4" fill="#fff"/>
      <rect x="28" y="25" width="4" height="4" fill="#fff"/>
      <rect x="34" y="25" width="4" height="4" fill="#fff"/>
    </svg>
  </div>

  <div id="search-progress-wrap">
    <div id="search-progress-bar"></div>
  </div>
  <div id="search-loading-label">Searching all sources…</div>
  <div id="loader-sources-wrap" style="display:none;flex-direction:column;align-items:center;gap:8px;margin-top:4px;">
    <div style="font-size:.75rem;color:#666;">Auto-selecting · or pick a server:</div>
    <div id="loader-sources" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:340px;"></div>
  </div>
</div>

<!-- Player overlay -->
<div id="player-view">
  <div id="player-topbar">
    <button id="player-back">✕</button>
    <div id="player-title"></div>
    <div id="player-src"></div>
    <div id="sub-select">
      <button id="sub-select-btn" title="Subtitles" style="display:none">SUB</button>
      <div id="sub-dropdown"></div>
    </div>
    <button id="cc-btn" title="Toggle captions" style="display:none">CC</button>
  </div>
  <div id="source-switcher"></div>
  <div id="player-video-wrap">
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div id="error-msg"></div>
    <video id="video" controls autoplay crossorigin="anonymous">
      <track id="cc-track" kind="subtitles" srclang="en" label="English" default/>
    </video>
  </div>
</div>

<script>
const API = '';
let dubMode = false;
let currentAnime = null;
let hls = null;
let _allResults = [];
let _activeGenres = new Set();

// ─── UI helpers ───────────────────────────────────────────
const $ = id => document.getElementById(id);
function show(el) { el.style.display = ''; }
function hide(el) { el.style.display = 'none'; }
function status(msg, persist = false) {
  const el = $('status');
  el.textContent = msg;
  el.classList.add('show');
  if (!persist) setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Filters ──────────────────────────────────────────────
$('filter-btn').addEventListener('click', () => {
  $('filter-bar').classList.toggle('show');
  $('filter-btn').classList.toggle('active');
});

function _filtersActive() {
  return $('filter-sort').value !== 'default' ||
         $('filter-format').value !== '' ||
         $('filter-status').value !== '' ||
         _activeGenres.size > 0;
}

function applyFilters() {
  $('clear-filters-btn').classList.toggle('show', _filtersActive());
  let results = [..._allResults];

  const fmt = $('filter-format').value;
  const st  = $('filter-status').value;
  // Only exclude results where we *know* the value doesn't match — unknown = keep
  if (fmt) results = results.filter(r => !r.format || r.format === fmt);
  if (st)  results = results.filter(r => !r.status || r.status === st);
  if (_activeGenres.size)
    results = results.filter(r => !(r.genres?.length) || [..._activeGenres].every(g => r.genres.includes(g)));

  const sort = $('filter-sort').value;
  if (sort === 'newest')        results.sort((a, b) => (b.year || 0) - (a.year || 0));
  else if (sort === 'oldest')   results.sort((a, b) => (a.year || 9999) - (b.year || 9999));
  else if (sort === 'az')       results.sort((a, b) => a.title.localeCompare(b.title));
  else if (sort === 'za')       results.sort((a, b) => b.title.localeCompare(a.title));
  else if (sort === 'score')    results.sort((a, b) => (b.score || 0) - (a.score || 0));
  else if (sort === 'episodes') results.sort((a, b) => (b.episodes || 0) - (a.episodes || 0));

  renderResults(results);
}

function buildGenreChips(results) {
  const counts = {};
  for (const r of results)
    for (const g of (r.genres || []))
      counts[g] = (counts[g] || 0) + 1;
  const genres = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 16).map(e => e[0]);
  const chips = $('genre-chips');
  chips.innerHTML = '';
  _activeGenres.clear();
  if (!genres.length) { $('genre-group').style.display = 'none'; return; }
  $('genre-group').style.display = '';
  for (const g of genres) {
    const chip = document.createElement('div');
    chip.className = 'genre-chip';
    chip.textContent = g;
    chip.addEventListener('click', () => {
      if (_activeGenres.has(g)) { _activeGenres.delete(g); chip.classList.remove('active'); }
      else { _activeGenres.add(g); chip.classList.add('active'); }
      applyFilters();
    });
    chips.appendChild(chip);
  }
}

$('filter-sort').addEventListener('change', applyFilters);
$('filter-format').addEventListener('change', applyFilters);
$('filter-status').addEventListener('change', applyFilters);
$('clear-filters-btn').addEventListener('click', () => {
  $('filter-sort').value = 'default';
  $('filter-format').value = '';
  $('filter-status').value = '';
  _activeGenres.clear();
  document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
  applyFilters();
});

// ─── Dub toggle ───────────────────────────────────────────
$('dub-toggle').addEventListener('click', () => {
  dubMode = !dubMode;
  $('dub-toggle').classList.toggle('active', dubMode);
  $('dub-toggle').textContent = dubMode ? '🎙 DUB ✓' : '🎙 DUB';
  // Re-run search immediately if results are already showing
  const hasQuery = $('search-input').value.trim();
  const resultsVisible = $('results-view').style.display !== 'none';
  const epVisible = $('ep-panel').classList.contains('open');
  if (hasQuery && (resultsVisible || epVisible)) doSearch();
});

// ─── Search ───────────────────────────────────────────────
$('search-btn').addEventListener('click', doSearch);
$('search-input').addEventListener('keydown', e => e.key === 'Enter' && doSearch());

function showSearchLoading(label = 'Searching all sources…') {
  $('search-loading-label').textContent = label;
  $('search-progress-bar').style.width = '0%';
  $('search-loading').classList.add('show');
  // Animate progress bar to ~85% during fetch, then snap to 100% on done
  let pct = 0;
  const interval = setInterval(() => {
    pct = Math.min(pct + (Math.random() * 8 + 2), 85);
    $('search-progress-bar').style.width = pct + '%';
  }, 300);
  return {
    done() {
      clearInterval(interval);
      $('search-progress-bar').style.width = '100%';
      setTimeout(() => $('search-loading').classList.remove('show'), 400);
    },
    fail() {
      clearInterval(interval);
      $('search-loading').classList.remove('show');
    }
  };
}

async function doSearch() {
  const q = $('search-input').value.trim();
  if (!q) return;
  hide($('home-view'));
  $('ep-panel').classList.remove('open');
  $('ep-panel').style.display = '';
  show($('results-view'));
  $('results-grid').innerHTML = '';

  const loader = showSearchLoading('Searching all sources…');
  try {
    const res = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&dub=${dubMode}`);
    const data = await res.json();
    loader.done();
    _allResults = data.results || [];
    buildGenreChips(_allResults);
    applyFilters();
  } catch (e) {
    loader.fail();
    status('Search failed: ' + e.message);
  }
}

function renderResults(results) {
  const grid = $('results-grid');
  if (!results.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">😿</div><p>No results found. Try a different name?</p></div>';
    return;
  }
  grid.innerHTML = '';
  for (const r of results) {
    const card = document.createElement('div');
    card.className = 'anime-card';
    const thumbHtml = r.thumb
      ? `<img src="${r.thumb}" alt="${r.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-thumb-placeholder\\'>🐱</div>'">`
      : `<div class="card-thumb-placeholder">🐱</div>`;
    const yearBadge = r.year ? `<span class="source-badge">${r.year}</span>` : '';
    const fmtBadge = r.format ? `<span class="source-badge">${r.format}</span>` : '';
    card.innerHTML = `
      ${thumbHtml}
      <div class="card-info">
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${r.episodes ? r.episodes + ' eps' : ''}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${yearBadge}${fmtBadge}</div>
      </div>`;
    card.addEventListener('click', () => openAnime(r));
    grid.appendChild(card);
  }
}

// ─── Episode panel ────────────────────────────────────────
async function openAnime(anime) {
  currentAnime = anime;
  hide($('results-view'));
  $('ep-panel').style.display = '';

  $('ep-panel').classList.add('open');

  $('ep-title').textContent = anime.title;
  $('ep-meta').textContent = `${anime.episodes || '?'} episodes · ${anime.source} · ${dubMode ? 'DUB' : 'SUB'}`;
  if (anime.thumb) $('ep-thumb').src = anime.thumb;

  const history = await fetchHistory();
  const key = `${anime.source}:${anime.id}`;
  const savedEp = history[key]?.ep || 0;

  // For GogoAnime results, episode count may be 0 — fetch it
  let epCount = anime.episodes || 0;
  if (!epCount && anime.source === 'gogoanime') {
    fetch(`/api/episodes?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}`)
      .then(r => r.json())
      .then(d => {
        if (d.count > 0) {
          anime.episodes = d.count;
          $('ep-meta').textContent = `${d.count} episodes · ${anime.source} · ${dubMode ? 'DUB' : 'SUB'}`;
          const grid = $('ep-grid');
          grid.innerHTML = '';
          for (let i = 1; i <= d.count; i++) {
            const btn = document.createElement('button');
            btn.className = 'ep-btn' + (i === savedEp ? ' current' : '');
            btn.textContent = i;
            btn.addEventListener('click', () => playEpisode(anime, i));
            grid.appendChild(btn);
          }
        }
      }).catch(() => {});
  }

  const grid = $('ep-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= epCount || i <= 1; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === savedEp ? ' current' : '');
    btn.textContent = i;
    btn.addEventListener('click', () => playEpisode(anime, i));
    grid.appendChild(btn);
    if (!epCount) break;
  }

  // Pre-warm stream cache for the most likely episode (fire-and-forget)
  const warmEp = savedEp || 1;
  fetch(`${API}/api/stream?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}&ep=${warmEp}&dub=${dubMode}`)
    .catch(() => {});
}

$('back-btn').addEventListener('click', () => {
  $('ep-panel').classList.remove('open');
  show($('results-view'));
});

// ─── Playback ─────────────────────────────────────────────
const SOURCE_LABELS = {
  'Yt-mp4': 'Direct MP4', 'Fm-Hls': 'Filemoon', 'Sw': 'Streamwish',
  'Vid-mp4': 'GogoAnime', 'Ok': 'OK.ru', 'S-mp4': 'Sharepoint',
  'Luf-Mp4': 'HiAnime', 'Default': 'Wixmp', 'Vg': 'Vidguard', 'Mp4': 'Mp4Upload',
};

function _openPlayer(anime, ep, streamData) {
  $('player-view').classList.add('open');
  showCcBtn();
  $('player-title').textContent = `${anime.title} · Ep ${ep}`;
  $('player-src').textContent = streamData.source || '';
  show($('loading-overlay'));
  hide($('error-msg'));
  $('video').src = '';
  loadStream(streamData.url, streamData.type);
  loadSourceSwitcher(anime, ep);
  autoLoadSubtitles(anime.title, ep);
  fetch('/api/history', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      source: anime.source, id: anime.id, title: anime.title,
      ep, dub: dubMode, thumb: anime.thumb || ''
    })
  });
}

async function playEpisode(anime, ep) {
  const loader = showSearchLoading(`Finding stream for ${anime.title} Ep ${ep}…`);

  // Hide loader sources from previous call
  $('loader-sources').innerHTML = '';
  $('loader-sources-wrap').style.display = 'none';

  const abortCtrl = new AbortController();
  let resolved = false;

  // Fetch source list in parallel (fast — no Playwright, just decryption)
  fetch(`${API}/api/sources?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}&ep=${ep}&dub=${dubMode}`)
    .then(r => r.json())
    .then(data => {
      if (resolved || !data.sources?.length) return;
      // Show source buttons in the cat loader
      const container = $('loader-sources');
      container.innerHTML = '';
      for (const src of data.sources) {
        const btn = document.createElement('button');
        btn.className = 'src-btn';
        btn.textContent = SOURCE_LABELS[src.name] || src.name;
        btn.addEventListener('click', async () => {
          if (resolved) return;
          resolved = true;
          abortCtrl.abort();
          loader.done();
          $('loader-sources-wrap').style.display = 'none';
          // Resolve chosen source and open player
          $('player-view').classList.add('open');
          showCcBtn();
          $('player-title').textContent = `${anime.title} · Ep ${ep}`;
          $('player-src').textContent = SOURCE_LABELS[src.name] || src.name;
          show($('loading-overlay'));
          hide($('error-msg'));
          $('video').src = '';
          try {
            const r = await fetch(`${API}/api/resolve?embed_url=${encodeURIComponent(src.url)}&name=${encodeURIComponent(src.name)}`);
            const d = await r.json();
            $('player-src').textContent = d.source || src.name;
            loadStream(d.url, d.type);
            loadSourceSwitcher(anime, ep);
          } catch (e) {
            hide($('loading-overlay'));
            $('error-msg').innerHTML = `<b>⚠ Source failed</b><br><small>${e.message}</small>`;
            $('error-msg').style.display = 'flex';
          }
        });
        container.appendChild(btn);
      }
      $('loader-sources-wrap').style.display = 'flex';
    })
    .catch(() => {});

  try {
    const res = await fetch(
      `${API}/api/stream?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}&ep=${ep}&dub=${dubMode}`,
      { signal: abortCtrl.signal }
    );
    const data = await res.json();
    if (resolved) return;
    resolved = true;

    if (!res.ok || data.error) throw new Error(data.detail || data.error || 'Stream unavailable');

    loader.done();
    $('loader-sources-wrap').style.display = 'none';
    _openPlayer(anime, ep, data);
  } catch (e) {
    if (e.name === 'AbortError') return; // user picked a source manually
    loader.fail();
    $('loader-sources-wrap').style.display = 'none';
    status('⚠ Stream failed: ' + e.message, true);
  }
}

function loadStream(url, type) {
  const video = $('video');
  if (hls) { hls.destroy(); hls = null; }
  _clearSubTracks();

  function onReady() {
    hide($('loading-overlay'));
    video.play().catch(() => hide($('loading-overlay')));
  }

  function onFatal(detail) {
    hide($('loading-overlay'));
    $('error-msg').innerHTML = `<b>⚠ Stream error</b><br><small>${detail || 'Click the episode again to retry.'}</small>`;
    $('error-msg').style.display = 'flex';
  }

  if (type === 'hls' && Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: false, maxBufferLength: 30 });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, onReady);
    hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, (_, data) => {
      if (data.subtitleTracks?.length) _buildSubMenu(data.subtitleTracks);
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hls.destroy();
          hls = new Hls();
          hls.loadSource(`${API}/api/proxy?url=${encodeURIComponent(url)}`);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, onReady);
          hls.on(Hls.Events.ERROR, (__, d) => { if (d.fatal) onFatal(d.details); });
        } else {
          onFatal(data.details);
        }
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadeddata', onReady, {once: true});
    video.addEventListener('error', () => onFatal(''), {once: true});
  } else {
    video.src = url;
    video.addEventListener('loadeddata', onReady, {once: true});
    video.addEventListener('error', () => onFatal(''), {once: true});
  }
}

$('player-back').addEventListener('click', () => {
  $('player-view').classList.remove('open');
  const video = $('video');
  video.pause();
  video.src = '';
  if (hls) { hls.destroy(); hls = null; }
  $('source-switcher').innerHTML = '';
  _clearSubTracks();
});

// ─── Subtitle track menu ──────────────────────────────────
function _clearSubTracks() {
  $('sub-dropdown').innerHTML = '';
  $('sub-select-btn').style.display = 'none';
  $('sub-select').classList.remove('open');
  $('sub-select-btn').classList.remove('on');
}

function _buildSubMenu(tracks) {
  const btn = $('sub-select-btn');
  const dd = $('sub-dropdown');
  dd.innerHTML = '';
  btn.style.display = '';

  // "Off" option
  const offBtn = document.createElement('button');
  offBtn.className = 'sub-opt active';
  offBtn.textContent = 'Off';
  offBtn.addEventListener('click', () => {
    if (hls) hls.subtitleTrack = -1;
    btn.classList.remove('on');
    dd.querySelectorAll('.sub-opt').forEach(b => b.classList.remove('active'));
    offBtn.classList.add('active');
    $('sub-select').classList.remove('open');
  });
  dd.appendChild(offBtn);

  tracks.forEach((t, i) => {
    const opt = document.createElement('button');
    opt.className = 'sub-opt';
    opt.textContent = t.name || t.lang || `Track ${i + 1}`;
    opt.addEventListener('click', () => {
      if (hls) hls.subtitleTrack = i;
      btn.classList.add('on');
      dd.querySelectorAll('.sub-opt').forEach(b => b.classList.remove('active'));
      opt.classList.add('active');
      $('sub-select').classList.remove('open');
    });
    dd.appendChild(opt);
  });

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    $('sub-select').classList.toggle('open');
  });
  document.addEventListener('click', () => $('sub-select').classList.remove('open'), { once: false });
}

// ─── Source switcher ──────────────────────────────────────
async function loadSourceSwitcher(anime, ep) {
  const bar = $('source-switcher');
  bar.innerHTML = '<span style="color:#555;font-size:.75rem;padding:2px 4px">Loading sources…</span>';

  try {
    const res = await fetch(`/api/sources?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}&ep=${ep}&dub=${dubMode}`);
    const data = await res.json();
    bar.innerHTML = '';

    for (const src of data.sources) {
      const btn = document.createElement('button');
      btn.className = 'src-btn';
      btn.textContent = SOURCE_LABELS[src.name] || src.name;
      btn.dataset.embedUrl = src.url;
      btn.dataset.srcName = src.name;
      btn.addEventListener('click', () => switchSource(btn, src));
      bar.appendChild(btn);
    }
  } catch (e) {
    bar.innerHTML = '';
  }
}

async function switchSource(btn, src) {
  // Mark button as loading
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active', 'loading'));
  btn.classList.add('active', 'loading');

  // Pause current
  $('video').pause();
  show($('loading-overlay'));
  hide($('error-msg'));

  try {
    const res = await fetch(`/api/resolve?embed_url=${encodeURIComponent(src.url)}&name=${encodeURIComponent(src.name)}`);
    const data = await res.json();
    btn.classList.remove('loading');
    if (data.error) throw new Error(data.detail || data.error);
    $('player-src').textContent = data.source || src.name;
    loadStream(data.url, data.type);
  } catch (e) {
    btn.classList.remove('active', 'loading');
    hide($('loading-overlay'));
    $('error-msg').innerHTML = `<b>⚠ Source failed</b><br><small>${src.name}: ${e.message}</small>`;
    $('error-msg').style.display = 'flex';
  }
}

// ─── History ──────────────────────────────────────────────
async function fetchHistory() {
  try {
    const res = await fetch('/api/history');
    return await res.json();
  } catch { return {}; }
}

async function loadHistory() {
  const history = await fetchHistory();
  const entries = Object.values(history);
  if (!entries.length) return;

  const section = $('history-section');
  section.style.display = '';
  hide($('home-empty'));

  const grid = $('history-grid');
  grid.innerHTML = '';
  for (const e of entries.slice(-12).reverse()) {
    const card = document.createElement('div');
    card.className = 'anime-card';
    const hThumb = e.thumb
      ? `<img src="${e.thumb}" alt="${e.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-thumb-placeholder\\'>🐱</div>'">`
      : `<div class="card-thumb-placeholder">🐱</div>`;
    card.innerHTML = `
      ${hThumb}
      <div class="card-info">
        <div class="card-title">${e.title}</div>
        <div class="card-meta">Ep ${e.ep} · ${e.dub ? 'DUB' : 'SUB'}</div>
        <span class="source-badge">${e.source}</span>
      </div>`;
    card.addEventListener('click', () => {
      currentAnime = e;
      playEpisode(e, e.ep);
    });
    grid.appendChild(card);
  }
}

// ─── Auto subtitles ───────────────────────────────────────
async function autoLoadSubtitles(title, ep) {
  // Skip if user already loaded a manual subtitle file
  if (ccTrack.src && ccTrack.src.startsWith('blob:')) return;
  try {
    const res = await fetch(`/api/subtitles?title=${encodeURIComponent(title)}&ep=${ep}`);
    const data = await res.json();
    const subs = data.subtitles || [];
    if (!subs.length) return;

    // Prefer English srt/vtt, fall back to first available
    const pick = subs.find(s => /eng|en[._-]/i.test(s.name)) || subs[0];

    // Fetch the subtitle file through our proxy to avoid CORS
    const subRes = await fetch(`/api/proxy?url=${encodeURIComponent(pick.url)}`);
    let text = await subRes.text();
    if (pick.name.endsWith('.srt')) text = srtToVtt(text);
    if (pick.name.endsWith('.ass') || pick.name.endsWith('.ssa')) return; // ASS not supported natively

    const blob = new Blob([text], { type: 'text/vtt' });
    const oldUrl = ccTrack.src;
    ccTrack.src = URL.createObjectURL(blob);
    if (oldUrl?.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
    ccTrack.track.mode = 'showing';
    ccBtn.classList.add('on');
    ccBtn.title = `Subtitles: ${pick.name} — click to toggle`;
  } catch (_) {}
}

// ─── Captions ─────────────────────────────────────────────
const ccBtn = $('cc-btn');
const ccTrack = $('cc-track');

// Hidden file input for subtitle files
const ccInput = document.createElement('input');
ccInput.type = 'file';
ccInput.accept = '.srt,.vtt,.ass';
ccInput.style.display = 'none';
document.body.appendChild(ccInput);

function srtToVtt(srt) {
  return 'WEBVTT\n\n' + srt
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
}

ccInput.addEventListener('change', () => {
  const file = ccInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    if (file.name.endsWith('.srt')) text = srtToVtt(text);
    const blob = new Blob([text], { type: 'text/vtt' });
    const oldUrl = ccTrack.src;
    ccTrack.src = URL.createObjectURL(blob);
    if (oldUrl && oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
    ccTrack.track.mode = 'showing';
    ccBtn.classList.add('on');
    ccBtn.title = 'Captions on — click to toggle';
  };
  reader.readAsText(file);
});

ccBtn.addEventListener('click', () => {
  if (!ccTrack.src) {
    // No subtitle loaded yet — open file picker
    ccInput.value = '';
    ccInput.click();
    return;
  }
  // Toggle on/off
  if (ccTrack.track.mode === 'showing') {
    ccTrack.track.mode = 'hidden';
    ccBtn.classList.remove('on');
    ccBtn.title = 'Captions off — click to toggle';
  } else {
    ccTrack.track.mode = 'showing';
    ccBtn.classList.add('on');
    ccBtn.title = 'Captions on — click to toggle';
  }
});

// Show CC button whenever player is open
function showCcBtn() { ccBtn.style.display = ''; }
$('player-back').addEventListener('click', () => { ccBtn.style.display = 'none'; }, true);

// Expose for player open
const _origPlayEp = playEpisode;

// ─── Init ─────────────────────────────────────────────────
loadHistory();
