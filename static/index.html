<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numper Ani</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161e;
      --border: #2a2a3a;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #e2e2e8;
      --muted: #888899;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ─── Layout ─── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    header { display: flex; align-items: center; gap: 14px; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    #logo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .brand { font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .brand span { color: var(--text); }

    /* ─── Search ─── */
    #search-bar { display: flex; gap: 10px; padding: 18px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    #search-input { flex: 1; padding: 10px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; outline: none; transition: border-color .2s; }
    #search-input:focus { border-color: var(--accent); }
    #dub-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .875rem; transition: border-color .2s; white-space: nowrap; }
    #dub-toggle.active { border-color: var(--accent); color: var(--accent); }
    #search-btn { padding: 10px 20px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    #search-btn:hover { background: var(--accent2); }

    /* ─── Main content ─── */
    main { flex: 1; padding: 24px; overflow-y: auto; }

    /* ─── Tabs ─── */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .9rem; transition: all .2s; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── Results grid ─── */
    #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
    .anime-card { border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s; }
    .anime-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--border); }
    .anime-card .card-info { padding: 10px; }
    .anime-card .card-title { font-size: .85rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .anime-card .card-meta { font-size: .75rem; color: var(--muted); }
    .anime-card .source-badge { display: inline-block; font-size: .65rem; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); margin-top: 4px; }

    /* ─── Episode panel ─── */
    #ep-panel { display: none; }
    #ep-panel.open { display: block; }
    #ep-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
    #ep-thumb { width: 80px; height: 112px; border-radius: 8px; object-fit: cover; background: var(--border); }
    #ep-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    #ep-meta { color: var(--muted); font-size: .875rem; }
    #back-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: .875rem; margin-bottom: 16px; }
    #ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 10px; }
    .ep-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; text-align: center; font-size: .9rem; font-weight: 600; transition: all .2s; }
    .ep-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ep-btn.watched { background: #1a2a1a; border-color: #2a4a2a; color: #4caf50; }
    .ep-btn.current { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── Player ─── */
    #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
    #player-view.open { display: flex; }
    #player-topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: rgba(0,0,0,0.8); position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
    #player-back { border: none; background: none; color: #fff; font-size: 1.5rem; cursor: pointer; line-height: 1; }
    #player-title { color: #fff; font-size: 1rem; font-weight: 600; flex: 1; }
    #player-src { color: var(--muted); font-size: .75rem; }
    video { width: 100%; height: 100%; object-fit: contain; }
    #loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 5; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 6; flex-direction: column; gap: 10px; color: #ff6b6b; text-align: center; padding: 24px; }

    /* ─── History ─── */
    #history-section { margin-bottom: 28px; }
    #history-section h2 { font-size: 1rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

    /* ─── Empty ─── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; }

    /* ─── Status ─── */
    #status { text-align: center; padding: 16px; color: var(--muted); font-size: .875rem; display: none; }
    #status.show { display: block; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <!-- Numper mascot: orange cat with glasses holding a book -->
    <svg id="logo" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="22" fill="#f97316"/>
      <!-- Body -->
      <ellipse cx="22" cy="28" rx="10" ry="9" fill="#fdba74"/>
      <!-- Book -->
      <rect x="14" y="26" width="8" height="10" rx="1" fill="#1e40af"/>
      <rect x="14.5" y="26.5" width="7" height="9" rx="0.5" fill="#3b82f6"/>
      <line x1="18" y1="27" x2="18" y2="35" stroke="#1e40af" stroke-width="0.5"/>
      <!-- Head -->
      <ellipse cx="22" cy="16" rx="9" ry="8" fill="#fdba74"/>
      <!-- Ears -->
      <polygon points="13,10 11,5 16,9" fill="#f97316"/>
      <polygon points="31,10 33,5 28,9" fill="#f97316"/>
      <!-- Eyes -->
      <ellipse cx="18.5" cy="15.5" rx="2.5" ry="1.5" fill="#fff"/>
      <ellipse cx="25.5" cy="15.5" rx="2.5" ry="1.5" fill="#fff"/>
      <circle cx="19" cy="15.5" r="1" fill="#333"/>
      <circle cx="26" cy="15.5" r="1" fill="#333"/>
      <!-- Glasses -->
      <rect x="15.5" y="13.5" width="6" height="4" rx="1.5" fill="none" stroke="#333" stroke-width="0.8"/>
      <rect x="22.5" y="13.5" width="6" height="4" rx="1.5" fill="none" stroke="#333" stroke-width="0.8"/>
      <line x1="21.5" y1="15.5" x2="22.5" y2="15.5" stroke="#333" stroke-width="0.8"/>
      <!-- Nose + mouth -->
      <ellipse cx="22" cy="18.5" rx="1" ry="0.7" fill="#f97316"/>
      <path d="M20.5 19.5 Q22 20.5 23.5 19.5" stroke="#f97316" stroke-width="0.7" fill="none"/>
      <!-- Whiskers -->
      <line x1="13" y1="17" x2="18" y2="18" stroke="#a16207" stroke-width="0.5"/>
      <line x1="13" y1="19" x2="18" y2="19" stroke="#a16207" stroke-width="0.5"/>
      <line x1="31" y1="17" x2="26" y2="18" stroke="#a16207" stroke-width="0.5"/>
      <line x1="31" y1="19" x2="26" y2="19" stroke="#a16207" stroke-width="0.5"/>
    </svg>
    <div class="brand">Numper <span>Ani</span></div>
  </header>

  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search anime... (e.g. Chained Soldier, One Piece)" autocomplete="off"/>
    <button id="dub-toggle" title="Toggle dub/sub">🎙 DUB</button>
    <button id="search-btn">Search</button>
  </div>

  <main>
    <div id="home-view">
      <div id="history-section" style="display:none">
        <h2>Continue Watching</h2>
        <div id="history-grid" class="results-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;"></div>
      </div>
      <div class="empty-state" id="home-empty">
        <div class="icon">🐱</div>
        <p>Search for an anime above to get started!</p>
      </div>
    </div>

    <div id="results-view" style="display:none">
      <div class="tabs">
        <div class="tab active" data-tab="all">All Sources</div>
      </div>
      <div id="results-grid" class="results-grid"></div>
    </div>

    <div id="ep-panel">
      <button id="back-btn">← Back to results</button>
      <div id="ep-header">
        <img id="ep-thumb" src="" alt=""/>
        <div>
          <div id="ep-title"></div>
          <div id="ep-meta"></div>
        </div>
      </div>
      <div id="ep-grid"></div>
    </div>
  </main>

  <div id="status"></div>
</div>

<!-- Player overlay -->
<div id="player-view">
  <div id="player-topbar">
    <button id="player-back">✕</button>
    <div id="player-title"></div>
    <div id="player-src"></div>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <div id="error-msg"></div>
  <video id="video" controls autoplay></video>
</div>

<script>
const API = '';
let dubMode = false;
let currentAnime = null;
let hls = null;

// ─── UI helpers ───────────────────────────────────────────
const $ = id => document.getElementById(id);
function show(el) { el.style.display = ''; }
function hide(el) { el.style.display = 'none'; }
function status(msg, persist = false) {
  const el = $('status');
  el.textContent = msg;
  el.classList.add('show');
  if (!persist) setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Dub toggle ───────────────────────────────────────────
$('dub-toggle').addEventListener('click', () => {
  dubMode = !dubMode;
  $('dub-toggle').classList.toggle('active', dubMode);
  $('dub-toggle').textContent = dubMode ? '🎙 DUB ✓' : '🎙 DUB';
});

// ─── Search ───────────────────────────────────────────────
$('search-btn').addEventListener('click', doSearch);
$('search-input').addEventListener('keydown', e => e.key === 'Enter' && doSearch());

async function doSearch() {
  const q = $('search-input').value.trim();
  if (!q) return;
  status('Searching…', true);
  hide($('home-view'));
  hide($('ep-panel'));
  show($('results-view'));
  $('results-grid').innerHTML = '';

  try {
    const res = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&dub=${dubMode}`);
    const data = await res.json();
    $('status').classList.remove('show');
    renderResults(data.results || []);
  } catch (e) {
    status('Search failed: ' + e.message);
  }
}

function renderResults(results) {
  const grid = $('results-grid');
  if (!results.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">😿</div><p>No results found. Try a different name?</p></div>';
    return;
  }
  grid.innerHTML = '';
  for (const r of results) {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.innerHTML = `
      <img src="${r.thumb || ''}" alt="${r.title}" onerror="this.style.display='none'"/>
      <div class="card-info">
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${r.episodes ? r.episodes + ' eps' : ''}</div>
        <span class="source-badge">${r.source}</span>
      </div>`;
    card.addEventListener('click', () => openAnime(r));
    grid.appendChild(card);
  }
}

// ─── Episode panel ────────────────────────────────────────
async function openAnime(anime) {
  currentAnime = anime;
  hide($('results-view'));
  $('ep-panel').classList.add('open');

  $('ep-title').textContent = anime.title;
  $('ep-meta').textContent = `${anime.episodes || '?'} episodes · ${anime.source} · ${dubMode ? 'DUB' : 'SUB'}`;
  if (anime.thumb) $('ep-thumb').src = anime.thumb;

  const epCount = anime.episodes || 0;
  const grid = $('ep-grid');
  grid.innerHTML = '';

  const history = await fetchHistory();
  const key = `${anime.source}:${anime.id}`;
  const savedEp = history[key]?.ep || 0;

  for (let i = 1; i <= epCount || i <= 1; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === savedEp ? ' current' : '');
    btn.textContent = i;
    btn.addEventListener('click', () => playEpisode(anime, i));
    grid.appendChild(btn);
    if (!epCount) break;
  }
}

$('back-btn').addEventListener('click', () => {
  $('ep-panel').classList.remove('open');
  show($('results-view'));
});

// ─── Playback ─────────────────────────────────────────────
async function playEpisode(anime, ep) {
  // Show player immediately with loading spinner
  $('player-view').classList.add('open');
  $('player-title').textContent = `${anime.title} · Ep ${ep}`;
  $('player-src').textContent = 'Loading…';
  show($('loading-overlay'));
  hide($('error-msg'));
  $('video').src = '';

  try {
    const res = await fetch(
      `${API}/api/stream?source=${encodeURIComponent(anime.source)}&id=${encodeURIComponent(anime.id)}&ep=${ep}&dub=${dubMode}`
    );
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.detail || data.error || 'Stream unavailable');
    }

    $('player-src').textContent = data.source || '';
    loadStream(data.url, data.type);

    // Save to history
    await fetch('/api/history', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        source: anime.source, id: anime.id, title: anime.title,
        ep, dub: dubMode, thumb: anime.thumb || ''
      })
    });
  } catch (e) {
    hide($('loading-overlay'));
    $('error-msg').innerHTML = `<b>⚠ Stream failed</b><br><small>${e.message}</small>`;
    $('error-msg').style.display = 'flex';
  }
}

function loadStream(url, type) {
  const video = $('video');

  if (hls) { hls.destroy(); hls = null; }

  const proxyUrl = `${API}/api/proxy?url=${encodeURIComponent(url)}`;

  if (type === 'hls' && Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: false });
    hls.loadSource(proxyUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      hide($('loading-overlay'));
      video.play();
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        // Try direct URL without proxy
        hls.destroy();
        video.src = url;
        video.play().then(() => hide($('loading-overlay'))).catch(() => {
          $('error-msg').innerHTML = '<b>⚠ Playback failed</b><br><small>Source may be geo-blocked or expired.</small>';
          $('error-msg').style.display = 'flex';
          hide($('loading-overlay'));
        });
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadeddata', () => hide($('loading-overlay')), {once: true});
    video.play();
  } else {
    video.src = proxyUrl;
    video.addEventListener('loadeddata', () => hide($('loading-overlay')), {once: true});
    video.play().catch(() => { video.src = url; video.play(); });
  }
}

$('player-back').addEventListener('click', () => {
  $('player-view').classList.remove('open');
  const video = $('video');
  video.pause();
  video.src = '';
  if (hls) { hls.destroy(); hls = null; }
});

// ─── History ──────────────────────────────────────────────
async function fetchHistory() {
  try {
    const res = await fetch('/api/history');
    return await res.json();
  } catch { return {}; }
}

async function loadHistory() {
  const history = await fetchHistory();
  const entries = Object.values(history);
  if (!entries.length) return;

  const section = $('history-section');
  section.style.display = '';
  hide($('home-empty'));

  const grid = $('history-grid');
  grid.innerHTML = '';
  for (const e of entries.slice(-12).reverse()) {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.innerHTML = `
      <img src="${e.thumb || ''}" alt="${e.title}" onerror="this.style.display='none'"/>
      <div class="card-info">
        <div class="card-title">${e.title}</div>
        <div class="card-meta">Ep ${e.ep} · ${e.dub ? 'DUB' : 'SUB'}</div>
        <span class="source-badge">${e.source}</span>
      </div>`;
    card.addEventListener('click', () => {
      currentAnime = e;
      playEpisode(e, e.ep);
    });
    grid.appendChild(card);
  }
}

// ─── Init ─────────────────────────────────────────────────
loadHistory();
</script>
</body>
</html>
